<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECHO Project Moçambique | Uber Look</title>
    <!-- Modern Font: Inter for a premium, clean look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --navy: #001F5B;
            --red: #BF0A30;
            --bg: #F6F6F6;
            --surface: #FFFFFF;
            --text-primary: #121212;
            --text-secondary: #6B6B6B;
            --input-bg: #F3F3F3;
        }

        body {
            background-color: var(--bg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* Mobile App Shell Simulation */
        .app-shell {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--surface);
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
        }

        .header-container {
            padding: 24px 24px 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-logo {
            width: 100px;
            object-fit: contain;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--navy);
            margin: 0;
            letter-spacing: -0.5px;
        }

        .welcome-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .main-content {
            padding: 0 24px 32px 24px;
            flex: 1;
        }

        /* Premium Form Elements */
        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-label i {
            color: var(--red);
            font-size: 14px;
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 20px;
        }

        .form-control, .form-select {
            background-color: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            color: var(--text-primary);
            font-weight: 500;
            transition: all 0.25s ease;
            box-shadow: none !important;
        }

        .form-control::placeholder {
            color: #A0A0A0;
            font-weight: 400;
        }

        .form-control:focus, .form-select:focus {
            background-color: var(--surface);
            border-color: var(--navy);
        }

        .form-control[readonly] {
            background-color: rgba(243, 243, 243, 0.6);
            color: var(--text-secondary);
        }

        /* Search Results Overlay */
        .search-results {
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,31,91,0.1);
            max-height: 220px;
            overflow-y: auto;
            display: none;
            position: absolute;
            width: 100%;
            top: 100%;
            left: 0;
            z-index: 20;
            margin-top: 4px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .search-item {
            padding: 16px;
            border-bottom: 1px solid #F0F0F0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-item:last-child {
            border-bottom: none;
        }

        .search-item:hover, .search-item:active {
            background: #F9F9F9;
        }

        .search-item strong {
            color: var(--navy);
            font-size: 15px;
            display: block;
            margin-bottom: 2px;
        }

        .search-item small {
            color: var(--text-secondary);
            font-size: 13px;
        }

        /* NID Input Special Styling */
        #nid {
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            font-weight: 700;
            color: var(--navy);
            font-size: 18px;
            text-align: center;
            background-color: rgba(0, 31, 91, 0.04);
        }

        /* Custom Switch */
        .form-switch .form-check-input {
            width: 44px;
            height: 24px;
            background-color: #D1D1D1;
            border: none;
            cursor: pointer;
        }

        .form-switch .form-check-input:checked {
            background-color: var(--navy);
        }

        .form-check-label {
            font-weight: 600;
            color: var(--text-primary);
            padding-top: 2px;
        }

        .confidente-box {
            display: none;
            background: rgba(191, 10, 48, 0.04);
            padding: 20px;
            border-radius: 16px;
            border-left: 4px solid var(--red);
            margin-bottom: 24px;
            animation: slideDown 0.3s ease-out forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Primary Button */
        .btn-submit {
            background: var(--navy);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin-top: 24px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
        }

        .btn-submit:hover {
            background: #001540;
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Divider */
        .section-divider {
            height: 1px;
            background: #EEEEEE;
            margin: 32px 0 24px 0;
        }

        /* Loading UI */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(4px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner-custom {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(0, 31, 91, 0.1);
            border-left-color: var(--navy);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Login Screen */
        #loginScreen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 24px;
            height: 100vh;
            background: var(--surface);
            text-align: center;
        }

        .login-logo {
            width: 160px;
            margin-bottom: 40px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 32px;
        }

        /* SweetAlert2 Uber Style */
        .swal2-popup {
            border-radius: 20px !important;
            padding: 24px !important;
        }
        .swal2-title {
            font-family: 'Inter', sans-serif !important;
            color: var(--navy) !important;
            font-weight: 700 !important;
        }
        .swal2-html-container {
            font-family: 'Inter', sans-serif !important;
        }
        .swal2-confirm {
            border-radius: 12px !important;
            font-weight: 600 !important;
            padding: 14px 24px !important;
        }
        .swal2-cancel {
            border-radius: 12px !important;
            font-weight: 600 !important;
            padding: 14px 24px !important;
            background-color: var(--input-bg) !important;
            color: var(--text-primary) !important;
        }

        /* Confirm Table */
        .confirm-table {
            width: 100%;
            font-size: 14px;
            text-align: left;
            border-collapse: separate;
            border-spacing: 0 12px;
        }
        .confirm-table th {
            color: var(--text-secondary);
            font-weight: 500;
            width: 35%;
            vertical-align: top;
        }
        .confirm-table td {
            font-weight: 600;
            color: var(--navy);
        }
        
        #appContent { display: none; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loader">
        <div class="spinner-custom"></div>
        <p class="mt-4 fw-bold" style="color: var(--navy); font-size: 15px;">A processar...</p>
    </div>

    <div class="app-shell">
        <!-- TELA DE LOGIN -->
        <div id="loginScreen">
            <!-- Caso a imagem não carregue, exibimos um fallback -->
            <img src="Novo logo ECHO 2025.png" alt="ECHO Logo" class="login-logo" onerror="this.style.display='none'">
            <h1 class="login-title">Projecto ECHO</h1>
            
            <div id="g_id_onload" 
                 data-client_id="895843191645-1ioi0feh6ocfu4dabghbda88bagjhrg8.apps.googleusercontent.com" 
                 data-callback="handleCredentialResponse">
            </div>
            <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"></div>
        </div>

        <!-- CONTEÚDO PRINCIPAL -->
        <div id="appContent">
            <div class="header-container">
                <div>
                    <h1 class="welcome-title" id="txtOla">Olá!</h1>
                    <p class="text-muted small mb-0 fw-medium">Confirme os dados antes de submeter.</p>
                </div>
                <img src="Novo logo ECHO 2025.png" alt="Logo" class="header-logo" onerror="this.style.display='none'">
            </div>

            <div class="main-content">
                <form id="appForm">
                    
                    <!-- UNIDADE SANITÁRIA -->
                    <label class="form-label"><i class="fas fa-hospital"></i> Unidade Sanitária</label>
                    <div class="input-group-custom">
                        <input type="text" id="searchUS" class="form-control" placeholder="Escreva o nome da US..." oninput="executarPesquisa(this.value)" autocomplete="off">
                        <div id="searchResults" class="search-results"></div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <input type="text" id="prov" class="form-control" placeholder="Província" readonly>
                        </div>
                        <div class="col-6">
                            <input type="text" id="dist" class="form-control" placeholder="Distrito" readonly>
                        </div>
                    </div>
                    <input type="hidden" id="us_final">

                    <div class="section-divider"></div>

                    <!-- PACIENTE -->
                    <label class="form-label"><i class="fas fa-user-circle"></i> Dados do Paciente</label>
                    <div class="mb-4">
                        <span class="d-block text-secondary small mb-2 fw-medium">NID (Formato: 10/4/5 dígitos)</span>
                        <input type="tel" id="nid" class="form-control" value="__________/____/_____" required oninput="aplicarMascaraNID(this)" placeholder="__________/____/_____">
                    </div>
                    
                    <div class="form-check form-switch mb-4 d-flex align-items-center gap-3">
                        <input class="form-check-input mt-0" type="checkbox" id="temConfidente" onchange="toggleConfidente()">
                        <label class="form-check-label" for="temConfidente">Paciente tem Confidente?</label>
                    </div>

                    <div id="camposConfidente" class="confidente-box mb-4">
                        <input type="text" id="nomeConfidente" class="form-control mb-3" placeholder="Nome do Confidente">
                        <input type="tel" id="telConfidente" class="form-control" placeholder="Telefone do Confidente (Ex: 841234567)" maxlength="9">
                    </div>

                    <div class="section-divider"></div>

                    <!-- CONTACTOS -->
                    <label class="form-label"><i class="fas fa-phone-alt"></i> Contactos & Morada</label>
                    <div class="mb-3">
                        <input type="tel" id="tel1" class="form-control" placeholder="Telefone 1 (Principal)" maxlength="9" required>
                    </div>
                    <div class="mb-3">
                        <input type="tel" id="tel2" class="form-control" placeholder="Telefone 2 (Opcional)" maxlength="9">
                    </div>
                    <div class="mb-4">
                        <textarea id="endereco" class="form-control" placeholder="Endereço ou Referência Actualizada" rows="3" required></textarea>
                    </div>

                    <div class="section-divider"></div>

                    <!-- RESPONSÁVEL -->
                    <label class="form-label"><i class="fas fa-id-badge"></i> Responsável pelo Registo</label>
                    <div class="mb-4">
                        <select id="responsavel" class="form-select" required></select>
                    </div>

                    <button type="submit" class="btn-submit">VERIFICAR E SUBMETER</button>
                </form>
            </div>
        </div>
    </div>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxMPjukA6IvdDTrA5ZF264SMAHhEzU543SODh1gMP7OYBKyKOniGtffeotFDlkj7E0S6A/exec";
        let todasUS = [];
        let userEmail = "";
        let dadosTemporarios = {};

        function toggleConfidente() {
            const box = document.getElementById("camposConfidente");
            if (document.getElementById("temConfidente").checked) {
                box.style.display = "block";
            } else {
                box.style.display = "none";
                document.getElementById("nomeConfidente").value = "";
                document.getElementById("telConfidente").value = "";
            }
        }

        // Fecha o dropdown de pesquisa ao clicar fora
        document.addEventListener('click', function(e) {
            if (!document.getElementById('searchUS').contains(e.target)) {
                document.getElementById('searchResults').style.display = 'none';
            }
        });

        function executarPesquisa(q) {
            const resBox = document.getElementById('searchResults');
            if (q.length < 2) { resBox.style.display = 'none'; return; }
            const matches = todasUS.filter(i => i.u.toLowerCase().includes(q.toLowerCase())).slice(0, 8);
            
            resBox.innerHTML = matches.map(m => `
                <div class="search-item" onclick="selecionarUS('${m.u.replace(/'/g, "\\'")}','${m.d.replace(/'/g, "\\'")}','${m.p.replace(/'/g, "\\'")}')">
                    <strong>${m.u}</strong>
                    <small>${m.p} • ${m.d}</small>
                </div>
            `).join('');
            
            resBox.style.display = matches.length ? 'block' : 'none';
        }

        function selecionarUS(u, d, p) {
            document.getElementById('us_final').value = u;
            document.getElementById('searchUS').value = u;
            document.getElementById('dist').value = d;
            document.getElementById('prov').value = p;
            document.getElementById('searchResults').style.display = 'none';
            
            // Highlight input momentarily to show selection
            const input = document.getElementById('searchUS');
            input.style.borderColor = 'var(--navy)';
            setTimeout(() => input.style.borderColor = 'transparent', 500);
        }

        function aplicarMascaraNID(i) {
            let v = i.value.replace(/\D/g, "");
            if (v.length > 19) v = v.substring(0, 19);
            
            let m = "__________/____/_____"; 
            let r = "";
            let nI = 0;
            for (let x = 0; x < m.length; x++) {
                if (m[x] === "/") r += "/";
                else r += (nI < v.length) ? v[nI++] : "_";
            }
            i.value = r;
        }

        async function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
            userEmail = payload.email.toLowerCase().trim();
            
            document.getElementById("loader").style.display = "flex";
            
            try {
                const res = await fetch(`${SCRIPT_URL}?check=${encodeURIComponent(userEmail)}`);
                const data = await res.json();
                
                if (data.status === "AUTORIZADO") {
                    // Update UI
                    const firstName = data.usuario.split(' ')[0];
                    document.getElementById("txtOla").innerText = "Olá, " + firstName + "!";
                    todasUS = data.unidades;
                    
                    // Populate select
                    const sel = document.getElementById("responsavel");
                    sel.innerHTML = '<option value="" disabled selected>Quem está a digitar?</option>';
                    data.responsaveis.forEach(n => {
                        let opt = new Option(n, n);
                        if(n.trim() === data.usuario.trim()) opt.selected = true;
                        sel.add(opt);
                    });
                    
                    // Transition screens
                    document.getElementById("loginScreen").style.display = "none";
                    document.getElementById("appContent").style.display = "block";
                    window.scrollTo(0,0);
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Acesso Negado',
                        text: 'Este email não está autorizado.',
                        confirmButtonColor: '#001F5B'
                    });
                }
            } catch (e) { 
                Swal.fire({
                    icon: 'error',
                    title: 'Erro de Conexão',
                    text: 'Falha ao sincronizar dados. Verifique a internet.',
                    confirmButtonColor: '#001F5B'
                }); 
            }
            document.getElementById("loader").style.display = "none";
        }

        document.getElementById('appForm').onsubmit = function(e) {
            e.preventDefault();
            
            const nidFinal = document.getElementById("nid").value;
            if(nidFinal.includes("_")) {
                return Swal.fire({
                    icon: 'warning',
                    title: 'NID Incompleto',
                    text: 'Preencha os 19 dígitos do NID antes de avançar.',
                    confirmButtonColor: '#001F5B'
                });
            }

            const usFinal = document.getElementById("us_final").value || document.getElementById("searchUS").value;
            if(!usFinal) {
                return Swal.fire({
                    icon: 'warning',
                    title: 'US Inválida',
                    text: 'Selecione uma Unidade Sanitária.',
                    confirmButtonColor: '#001F5B'
                });
            }

            const tel1 = document.getElementById("tel1").value;
            const tel2 = document.getElementById("tel2").value || "N/A";
            const morada = document.getElementById("endereco").value;
            const resp = document.getElementById("responsavel").value;

            dadosTemporarios = {
                email_usuario: userEmail,
                provincia: document.getElementById("prov").value,
                distrito: document.getElementById("dist").value,
                us: usFinal,
                nid: nidFinal,
                tem_confidente: document.getElementById("temConfidente").checked ? "Sim" : "Não",
                nome_confidente: document.getElementById("nomeConfidente").value || "N/A",
                tel_confidente: document.getElementById("telConfidente").value || "N/A",
                tel1: tel1,
                tel2: tel2,
                endereco: morada,
                responsavel: resp
            };

            // PÁGINA DE CONFIRMAÇÃO (SweetAlert2 Uber Style)
            Swal.fire({
                title: 'Confirmar Dados',
                html: `
                    <div style="background: #F9F9F9; padding: 20px; border-radius: 16px; margin-top: 10px;">
                        <table class="confirm-table">
                            <tr><th>Gestor:</th><td>${dadosTemporarios.responsavel}</td></tr>
                            <tr><th>US:</th><td>${dadosTemporarios.us}</td></tr>
                            <tr><th>NID:</th><td>${nidFinal}</td></tr>
                            <tr><th>Tel 1:</th><td>${tel1}</td></tr>
                            ${tel2 !== 'N/A' ? `<tr><th>Tel 2:</th><td>${tel2}</td></tr>` : ''}
                        </table>
                        <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #EBEBEB; text-align: left;">
                            <span style="display: block; color: var(--text-secondary); font-size: 13px; margin-bottom: 4px;">Morada:</span>
                            <strong style="color: var(--navy); font-size: 14px;">${morada}</strong>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonColor: '#001F5B',
                cancelButtonColor: '#F3F3F3',
                confirmButtonText: 'Gravar Registo',
                cancelButtonText: 'Rever Dados',
                reverseButtons: true
            }).then((result) => { 
                if (result.isConfirmed) capturarGPS(); 
            });
        };

        function capturarGPS() {
            document.getElementById("loader").style.display = "flex";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        dadosTemporarios.latitude = pos.coords.latitude;
                        dadosTemporarios.longitude = pos.coords.longitude;
                        finalizar();
                    }, 
                    () => {
                        dadosTemporarios.latitude = "Sem GPS";
                        dadosTemporarios.longitude = "Sem GPS";
                        finalizar();
                    }, 
                    { timeout: 7000, enableHighAccuracy: true }
                );
            } else {
                dadosTemporarios.latitude = "Não Suportado";
                dadosTemporarios.longitude = "Não Suportado";
                finalizar();
            }
        }

        function finalizar() {
            fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify(dadosTemporarios) 
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("loader").style.display = "none";
                Swal.fire({
                    icon: 'success',
                    title: 'Sucesso',
                    text: 'Os dados foram gravados na folha de registo.',
                    confirmButtonColor: '#001F5B',
                    confirmButtonText: 'Novo Registo'
                }).then(() => {
                    // Reset Form but keep basic session data
                    const currentResponsavel = document.getElementById("responsavel").value;
                    document.getElementById("appForm").reset();
                    
                    // Reset Specific fields
                    document.getElementById("nid").value = "__________/____/_____";
                    document.getElementById("us_final").value = "";
                    document.getElementById("camposConfidente").style.display = "none";
                    document.getElementById("responsavel").value = currentResponsavel;
                    
                    window.scrollTo(0, 0);
                });
            })
            .catch(err => {
                document.getElementById("loader").style.display = "none";
                Swal.fire({
                    icon: 'error',
                    title: 'Erro ao Gravar',
                    text: 'Houve uma falha na comunicação com o servidor.',
                    confirmButtonColor: '#001F5B'
                });
            });
        }
    </script>
</body>
</html>
