<!DOCTYPE html>
<html lang="pt">

<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#003366">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECHO Project Moçambique</title>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="description" content="Aplicação oficial do Projecto ECHO para a actualização de dados de contacto e endereço de pacientes em Moçambique.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://registo-saude.vercel.app/"> 
    <meta property="og:title" content="ECHO Project - Actualização de Dados">
    <meta property="og:description" content="Plataforma segura para actualização de contactos de pacientes. Uso exclusivo para equipas ECHO.">
    <meta property="og:image" content="https://registo-saude.vercel.app/Novo%20logo%20ECHO%202025.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        :root { --primary: #003366; --accent: #C8102E; --bg: #f2f4f7; }
        body { background-color: var(--bg); font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        .app-shell { max-width: 500px; margin: 0 auto; min-height: 100vh; padding-bottom: 20px; }
        .form-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06); margin: 15px; border: none; }
        .app-header { text-align: center; padding: 25px 15px; background: linear-gradient(135deg, var(--primary) 0%, #004d99 100%); color: white; border-radius: 0 0 30px 30px; margin-bottom: 25px; }
        .section-header { color: var(--primary); margin: 25px 0 15px 0; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; display: flex; align-items: center; border-bottom: 2px solid #f0f0f0; padding-bottom: 8px; }
        .section-header i { margin-right: 10px; color: var(--accent); }
        .form-control, .form-select { border-radius: 12px; padding: 12px; border: 1.5px solid #e0e0e0; font-size: 16px; }
        .btn-submit { background: linear-gradient(135deg, var(--primary) 0%, #004d99 100%); color: white; border: none; border-radius: 16px; padding: 16px; font-weight: 700; width: 100%; margin-top: 20px; box-shadow: 0 4px 15px rgba(0, 51, 102, 0.2); }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        #appContent { display: none; }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loader">
        <div class="spinner-grow text-primary"></div>
        <p class="mt-3 fw-bold text-primary">A processar...</p>
    </div>

    <div class="app-shell">
        <div id="loginScreen" class="p-3" style="display: flex; align-items: center; min-height: 90vh;">
            <div class="form-card text-center w-100">
                <img src="Novo logo ECHO 2025.png" alt="ECHO Project" class="mb-3" style="width: 220px;" onerror="this.src='https://via.placeholder.com/200x100?text=ECHO+PROJECT'">
                <div class="mb-4 p-2 rounded" style="background-color: #f8f9fa; border-left: 4px solid var(--primary);">
                    <h6 class="fw-bold text-uppercase small mb-1" style="color: var(--primary);">Plataforma de Actualização</h6>
                    <p class="text-muted small mb-0">Actualização rápida e segura de dados de contacto de pacientes.</p>
                </div>
                <h4 class="fw-bold mb-3" style="color: var(--primary)">Acesso</h4>
                <div id="g_id_onload" data-client_id="895843191645-1ioi0feh6ocfu4dabghbda88bagjhrg8.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                <div class="g_id_signin d-flex justify-content-center" data-type="standard"></div>
            </div>
        </div>

        <div id="appContent">
            <div class="app-header">
                <img src="Novo logo ECHO 2025.png" alt="ECHO Logo" style="width: 140px; margin-bottom: 10px;">
                <h5 class="fw-bold mb-1">PROJECTO ECHO</h5>
                <small class="opacity-75">Actualização de Endereços e Contactos</small>
            </div>

            <div class="form-card">
                <form id="appForm">
                    <div class="section-header"><i class="fas fa-hospital"></i> Unidade Sanitária</div>
                    <select id="prov" class="form-select mb-3" required onchange="filtrarDistritos()">
                        <option value="">Província...</option>
                        <option value="Manica">Manica</option>
                        <option value="Niassa">Niassa</option>
                        <option value="Sofala">Sofala</option>
                        <option value="Tete">Tete</option>
                    </select>
                    <select id="dist" class="form-select mb-3" required disabled onchange="filtrarUS()">
                        <option value="">Distrito...</option>
                    </select>
                    <select id="us" class="form-select mb-3" required disabled>
                        <option value="">US...</option>
                    </select>

                    <div class="section-header"><i class="fas fa-user"></i> Paciente</div>
                    <label class="form-label small fw-bold">NID (Paciente)</label>
                    <input type="tel" id="nid" class="form-control mb-3" value="__________/____/_____" required oninput="aplicarMascaraNID(this)" style="font-family: monospace; letter-spacing: 2px; font-weight: bold; color: var(--primary);">

                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="temConfidente" onchange="toggleConfidente()">
                        <label class="form-check-label fw-bold small" for="temConfidente">Tem Confidente?</label>
                    </div>

                    <div id="camposConfidente" style="display:none; background: #fdf2f2; padding: 15px; border-radius: 12px; border: 1px dashed var(--accent)" class="mb-3">
                        <input type="text" id="nomeConfidente" class="form-control mb-2" placeholder="Nome do Confidente">
                        <input type="tel" id="telConfidente" class="form-control" placeholder="Telefone (84/82...)" maxlength="9">
                    </div>

                    <div class="section-header"><i class="fas fa-phone"></i> Contactos</div>
                    <div class="row">
                        <div class="col-6"><label class="form-label small fw-bold">Telefone 1</label><input type="tel" id="tel1" class="form-control" placeholder="84..." maxlength="9" required></div>
                        <div class="col-6"><label class="form-label small fw-bold">Telefone 2</label><input type="tel" id="tel2" class="form-control" placeholder="82..." maxlength="9"></div>
                    </div>
                    <textarea id="endereco" class="form-control mt-3" rows="2" placeholder="Endereço Completo" required></textarea>

                    <div class="mt-3">
                        <label class="form-label small fw-bold">Responsável pela Actualização</label>
                        <input type="text" id="responsavel" class="form-control" placeholder="Responsável pelo Registo" required>
                    </div>

                    <button type="submit" class="btn-submit">SUBMETER DADOS</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyiH7DLonvttzbczDGe_3hjaaV0Ql9sREqsBzcscZr0nyBj6HtFVlIYiK60MZq1T5Bq7A/exec";
        let userEmail = "";
        let dadosTemporarios = {};

        // Máscara de Telefone e bloqueio de letras
        ['tel1', 'tel2', 'telConfidente'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '').substring(0, 9);
            });
        });

        function validarTelefone(num) {
            if (!num || num === "N/A") return true;
            return /^(82|83|84|85|86|87)[0-9]{7}$/.test(num);
        }

        function aplicarMascaraNID(i) {
            let v = i.value.replace(/\D/g, "").substring(0, 19);
            let m = "__________/____/_____", r = "", nI = 0;
            for (let x = 0; x < m.length; x++) {
                if (m[x] === "/") r += "/";
                else r += (nI < v.length) ? v[nI++] : "_";
            }
            i.value = r;
        }

        function parseJwt(t) { return JSON.parse(atob(t.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'))); }

        async function handleCredentialResponse(response) {
            const payload = parseJwt(response.credential);
            userEmail = payload.email.toLowerCase().trim();
            document.getElementById("loader").style.display = "flex";
            try {
                const res = await fetch(`${SCRIPT_URL}?check=${encodeURIComponent(userEmail)}`);
                const status = await res.text();
                if (status.includes("AUTORIZADO")) {
                    document.getElementById("loginScreen").style.display = "none";
                    document.getElementById("appContent").style.display = "block";
                } else {
                    Swal.fire('Acesso Negado', 'E-mail não autorizado.', 'error');
                }
            } catch (e) { Swal.fire('Erro', 'Falha na rede.', 'error'); }
            document.getElementById("loader").style.display = "none";
        }

        const baseDados = {
            "Manica": { "Barue": ["Catandica HD", "Chuala CS"], "Chimoio": ["1º Maio CS", "Chimoio HP"], "Gondola": ["Amatonga", "Gondola S"], "Guro": ["Guro - Sed"], "Macate": ["Macate CS"], "Machaze": ["Bassane CS"], "Manica": ["Manica HD"], "Mossurize": ["Espungabe"], "Sussundenga": ["Sussunder"], "Vanduzi": ["Vanduzi C"] },
            "Niassa": { "Cuamba": ["Cuamba H"], "Lago": ["Metangula"], "Lichinga": ["Lichinga H"], "Mandimba": ["Mandimba"], "Mecanhelas": ["Mecanhela"], "Metarica": ["Metarica C"], "Ngauma": ["Massangu"] },
            "Sofala": { "Beira": ["Hospital C", "Munhava C"], "Buzi": ["Buzi Sede"], "Caia": ["Caia HD"], "Cheringoma": ["Inhaminga"], "Chibabava": ["Muxungue"], "Dondo": ["Dondo Sed"], "Gorongosa": ["Gorongoza"], "Machanga": ["Machang C"], "Marromeu": ["Marromeu"], "Nhamatanda": ["Nhamatan"] },
            "Tete": { "Angonia": ["Ulongue H"], "Cahora Bassa": ["Songo HR"], "Changara": ["Changara C"], "Chiuta": ["Manje CS"], "Macanga": ["Furancung"], "Magoe": ["Magoe CS"], "Marara": ["Boroma CS"], "Moatize": ["Moatize C"], "Mutarara": ["Mutarara H"], "Tete": ["Tete HP"] }
        };

        function filtrarDistritos() {
            const p = document.getElementById("prov").value;
            const d = document.getElementById("dist");
            d.innerHTML = '<option value="">Distrito...</option>';
            d.disabled = !p;
            if (p) Object.keys(baseDados[p]).sort().forEach(x => d.options.add(new Option(x, x)));
        }

        function filtrarUS() {
            const p = document.getElementById("prov").value, dist = document.getElementById("dist").value;
            const u = document.getElementById("us");
            u.innerHTML = '<option value="">US...</option>';
            u.disabled = !dist;
            if (dist) baseDados[p][dist].sort().forEach(x => u.options.add(new Option(x, x)));
        }

        function toggleConfidente() { document.getElementById("camposConfidente").style.display = document.getElementById("temConfidente").checked ? "block" : "none"; }

        document.getElementById('appForm').onsubmit = function (e) {
            e.preventDefault();
            const t1 = document.getElementById("tel1").value;
            const tc = document.getElementById("telConfidente").value;

            if (!validarTelefone(t1)) return Swal.fire('Erro', 'Telefone 1 inválido (Use 82-87).', 'error');
            if (tc && !validarTelefone(tc)) return Swal.fire('Erro', 'Telefone do Confidente inválido.', 'error');

            const nidLimpo = document.getElementById("nid").value.replace(/_/g, "");
            dadosTemporarios = {
                email_usuario: userEmail,
                provincia: document.getElementById("prov").value,
                distrito: document.getElementById("dist").value,
                us: document.getElementById("us").value,
                nid: nidLimpo,
                tem_confidente: document.getElementById("temConfidente").checked ? "Sim" : "Não",
                nome_confidente: document.getElementById("nomeConfidente").value || "N/A",
                tel_confidente: tc || "N/A",
                tel1: t1,
                tel2: document.getElementById("tel2").value || "N/A",
                endereco: document.getElementById("endereco").value,
                responsavel: document.getElementById("responsavel").value
            };

            Swal.fire({
                title: 'Confirmar?',
                text: "NID: " + nidLimpo,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Enviar'
            }).then((r) => { if (r.isConfirmed) enviarComGps(); });
        };

        function enviarComGps() {
            document.getElementById("loader").style.display = "flex";
            navigator.geolocation.getCurrentPosition((p) => {
                dadosTemporarios.latitude = p.coords.latitude;
                dadosTemporarios.longitude = p.coords.longitude;
                finalizar();
            }, () => {
                dadosTemporarios.latitude = "Sem GPS";
                dadosTemporarios.longitude = "Sem GPS";
                finalizar();
            }, { timeout: 5000 });
        }

        function finalizar() {
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dadosTemporarios) })
                .then(() => {
                    document.getElementById("loader").style.display = "none";
                    Swal.fire({
                        title: 'Sucesso!',
                        text: 'Dados guardados.',
                        icon: 'success',
                        showCancelButton: true,
                        confirmButtonText: 'Inserir Outro',
                        cancelButtonText: 'Sair'
                    }).then((res) => {
                        if (res.isConfirmed) {
                            document.getElementById("appForm").reset();
                            document.getElementById("nid").value = "__________/____/_____";
                            document.getElementById("camposConfidente").style.display = "none";
                            window.scrollTo(0, 0);
                        } else { location.reload(); }
                    });
                });
        }
    </script>
</body>
</html>
